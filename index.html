<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>水道配管 AR</title>

  <!-- model-viewer — iOS AR Quick Look ブリッジ -->
  <script async src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>

  <!-- Three.js v0.160.0 importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    }

    /* カメラ映像背景 */
    #camera {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Three.js プレビューキャンバス */
    #preview {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
      touch-action: none;
    }

    /* model-viewer — 仕様上 DOM に含めるが視覚的に非表示 */
    model-viewer {
      position: fixed;
      width: 1px; height: 1px;
      bottom: 0; right: 0;
      opacity: 0; pointer-events: none; overflow: hidden;
    }

    /* コントロールパネル */
    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      background: rgba(8, 10, 22, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      color: #fff;
    }

    .row {
      display: flex; gap: 12px;
      margin-bottom: 14px;
      align-items: flex-end;
    }

    .field { flex: 1; display: flex; flex-direction: column; gap: 5px; }

    .field label {
      font-size: 11px; font-weight: 700;
      color: #6688AA; letter-spacing: 0.6px; text-transform: uppercase;
    }

    .field input {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff; font-size: 18px; font-weight: 500;
      -webkit-appearance: none; appearance: none;
    }

    .field input:focus {
      outline: none; border-color: #007AFF;
      background: rgba(0,122,255,0.1);
    }

    .btn-row { display: flex; gap: 10px; }

    /* 共通ボタン見た目 */
    .btn {
      flex: 1; padding: 14px 10px;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.12s;
      text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
    }
    .btn:active { opacity: 0.7; }

    #updateBtn {
      background: rgba(255,255,255,0.13);
      color: #fff; flex: 0.65;
    }

    /* AR ボタン = <a rel="ar"> ─ ユーザーが直接タップするので
       非同期処理を挟まずジェスチャが維持される */
    #arBtn {
      background: #007AFF; color: #fff; flex: 1.35;
      position: relative;
    }

    #arBtn[data-disabled="true"] {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.25);
      pointer-events: none;
    }

    /* iOS AR Quick Look に必須の <img> 子要素（視覚的に隠す） */
    #arThumb {
      position: absolute;
      width: 0; height: 0;
      opacity: 0; pointer-events: none;
    }

    #status {
      margin-top: 10px; font-size: 12px;
      color: #556688; text-align: center; min-height: 16px;
    }
  </style>
</head>
<body>

  <!-- デバイスカメラ映像 -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- Three.js 3D プレビュー -->
  <canvas id="preview"></canvas>

  <!--
    model-viewer: iOS AR Quick Look を GLB で使うための仕様上必須要素。
    実際の AR 起動は下の <a rel="ar"> で行う（model-viewer.activateAR() は
    element が非表示だと 'load' イベントが発火しないため使わない）。
  -->
  <model-viewer
    id="modelViewer"
    ar ar-modes="quick-look" ar-scale="fixed"
    camera-controls>
  </model-viewer>

  <div id="controls">
    <div class="row">
      <div class="field">
        <label>外径 (mm)</label>
        <input type="number" id="outerDia" value="100"
               min="10" max="500" step="5" inputmode="decimal">
      </div>
      <div class="field">
        <label>長さ (mm)</label>
        <input type="number" id="pipeLen" value="1000"
               min="100" max="5000" step="50" inputmode="decimal">
      </div>
    </div>

    <div class="btn-row">
      <button id="updateBtn" class="btn">更新</button>

      <!--
        <a rel="ar"> = iOS AR Quick Look のネイティブトリガー。
        ユーザーが直接タップするので非同期待ちなしでジェスチャが通る。
        <img> 子要素は iOS の仕様上必須（サムネイル用）。
      -->
      <a id="arBtn" class="btn"
         rel="ar" href="./pipe.glb"
         data-disabled="true">
        <img id="arThumb"
             src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12NgAAIABQAABjE+ibYAAAAASUVORK5CYII="
             alt="" aria-hidden="true">
        AR で実寸配置
      </a>
    </div>

    <div id="status">起動中...</div>
  </div>

  <script type="module">
    import * as THREE   from 'three';
    import { GLTFExporter }  from 'three/addons/exporters/GLTFExporter.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ══════════════════════════════════════════════════
       Service Worker
    ══════════════════════════════════════════════════ */
    let swReady = false;

    async function registerSW() {
      if (!('serviceWorker' in navigator)) return false;
      try {
        await navigator.serviceWorker.register('./sw.js', { scope: './' });
        await navigator.serviceWorker.ready;
        // clients.claim() が完了するまで controller が null のことがある
        if (!navigator.serviceWorker.controller) {
          await new Promise(resolve => {
            navigator.serviceWorker.addEventListener('controllerchange', resolve, { once: true });
            setTimeout(resolve, 3000); // フォールバック
          });
        }
        return !!navigator.serviceWorker.controller;
      } catch (e) {
        console.error('SW:', e);
        return false;
      }
    }

    function sendGLBtoSW(buffer) {
      return new Promise((resolve, reject) => {
        if (!navigator.serviceWorker.controller) { reject(new Error('no SW controller')); return; }
        const { port1, port2 } = new MessageChannel();
        port1.onmessage = e => (e.data.ok ? resolve() : reject(new Error('SW store failed')));
        navigator.serviceWorker.controller.postMessage(
          { type: 'STORE_GLB', buffer },
          [port2, buffer]          // buffer を転送（ゼロコピー）
        );
      });
    }

    /* ══════════════════════════════════════════════════
       配管ジオメトリ
       scale = 1     → mm 座標（Three.js プレビュー用）
       scale = 0.001 → m 座標（AR GLB 用）
    ══════════════════════════════════════════════════ */
    function buildPipeGroup(outerDiaMm, lengthMm, scale = 1) {
      const outerR = (outerDiaMm / 2) * scale;
      const wallMm = Math.max(2, outerDiaMm * 0.08);          // 肉厚 最小 2mm
      const innerR = Math.max(scale * 0.5, (outerDiaMm / 2 - wallMm) * scale);
      const len    = lengthMm * scale;

      const group = new THREE.Group();

      // ── 外面（グレー・FrontSide）
      const outerGeo = new THREE.CylinderGeometry(outerR, outerR, len, 48, 1, true);
      group.add(new THREE.Mesh(outerGeo, new THREE.MeshStandardMaterial({
        color: 0x8A8A8A, roughness: 0.55, metalness: 0.15, side: THREE.FrontSide,
      })));

      // ── 内面（水色・DoubleSide で開口部から見える）
      const innerGeo = new THREE.CylinderGeometry(innerR, innerR, len, 48, 1, true);
      group.add(new THREE.Mesh(innerGeo, new THREE.MeshStandardMaterial({
        color: 0x87CEEB, roughness: 0.25, metalness: 0.0, side: THREE.DoubleSide,
      })));

      // ── 端面リング（環状・DoubleSide）
      const capMat = new THREE.MeshStandardMaterial({
        color: 0x8A8A8A, roughness: 0.55, metalness: 0.15, side: THREE.DoubleSide,
      });
      for (const sign of [-1, 1]) {
        const cap = new THREE.Mesh(new THREE.RingGeometry(innerR, outerR, 48), capMat);
        cap.rotation.x = Math.PI / 2;
        cap.position.y = sign * len / 2;
        group.add(cap);
      }

      return group;
    }

    /* ══════════════════════════════════════════════════
       Three.js プレビュー
    ══════════════════════════════════════════════════ */
    const canvas   = document.getElementById('preview');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene  = new THREE.Scene();
    const cam3D  = new THREE.PerspectiveCamera(55, 1, 0.1, 100000);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 0.9);
    sun.position.set(2, 5, 3); scene.add(sun);
    const rim = new THREE.DirectionalLight(0xAADDFF, 0.4);
    rim.position.set(-3, 1, -2); scene.add(rim);

    const orbit = new OrbitControls(cam3D, canvas);
    orbit.enableDamping = true; orbit.dampingFactor = 0.07;
    orbit.minDistance = 10; orbit.maxDistance = 20000;

    let previewMesh = null;

    function refreshPreview(outerDia, length) {
      if (previewMesh) {
        scene.remove(previewMesh);
        previewMesh.traverse(o => {
          o.geometry?.dispose();
          if (o.material) [].concat(o.material).forEach(m => m.dispose());
        });
      }
      previewMesh = buildPipeGroup(outerDia, length, 1); // mm スケール
      previewMesh.rotation.z = Math.PI / 2;              // 水平配置
      scene.add(previewMesh);

      // カメラをパイプサイズに合わせてリセット
      const d = Math.max(outerDia, length);
      cam3D.position.set(0, d * 0.45, d * 1.5);
      cam3D.lookAt(0, 0, 0);
      orbit.target.set(0, 0, 0);
      orbit.update();
    }

    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      cam3D.aspect = w / h;
      cam3D.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    (function loop() { requestAnimationFrame(loop); orbit.update(); renderer.render(scene, cam3D); })();

    /* ══════════════════════════════════════════════════
       デバイスカメラ（背景映像）
    ══════════════════════════════════════════════════ */
    async function startCamera() {
      const video = document.getElementById('camera');
      try {
        video.srcObject = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
        });
      } catch (e) {
        console.warn('Camera:', e.message);
        video.style.background = 'linear-gradient(135deg,#0f0c29,#302b63,#24243e)';
      }
    }

    /* ══════════════════════════════════════════════════
       GLB 生成 & SW キャッシュ
       ─ 「更新」ボタン押下・入力変更時に呼ぶ。
       ─ AR ボタンタップ前に完了しておくことで
         <a rel="ar"> の直接クリックが成立する。
    ══════════════════════════════════════════════════ */
    const arBtn    = document.getElementById('arBtn');
    const statusEl = document.getElementById('status');
    let glbReady   = false;
    let generating = false;

    async function generateAndCache(outerDia, length) {
      if (!swReady || generating) return;
      generating = true;
      statusEl.textContent = 'GLB 生成中...';

      try {
        // AR シーン（メートル単位）
        const arScene = new THREE.Scene();
        const arPipe  = buildPipeGroup(outerDia, length, 0.001);
        arPipe.rotation.z = Math.PI / 2;          // 水平（床置き）
        arPipe.position.y = (outerDia / 2) * 0.001; // 外半径分だけ浮かせて床面に接地
        arScene.add(arPipe);

        const exporter = new GLTFExporter();
        const raw = await new Promise((resolve, reject) =>
          exporter.parse(arScene, resolve, reject, { binary: true })
        );

        // GLTFExporter は ArrayBuffer を返すが念のため正規化
        const ab = raw instanceof ArrayBuffer ? raw.slice(0) : new Uint8Array(raw).buffer.slice(0);

        await sendGLBtoSW(ab);

        // model-viewer の src も更新（仕様上の要素として機能させる）
        document.getElementById('modelViewer').src = `./pipe.glb?t=${Date.now()}`;

        glbReady = true;
        arBtn.dataset.disabled = 'false';
        statusEl.textContent = 'GLB 準備完了 — AR ボタンで実寸配置';
      } catch (e) {
        statusEl.textContent = 'GLB 生成エラー: ' + e.message;
        console.error(e);
      } finally {
        generating = false;
      }
    }

    /* ══════════════════════════════════════════════════
       UI イベント
    ══════════════════════════════════════════════════ */
    function getParams() {
      return {
        outerDia: Math.max(10,  parseFloat(document.getElementById('outerDia').value) || 100),
        length:   Math.max(100, parseFloat(document.getElementById('pipeLen').value)  || 1000),
      };
    }

    async function updateAll() {
      const { outerDia, length } = getParams();
      refreshPreview(outerDia, length);
      await generateAndCache(outerDia, length);
    }

    // AR ボタン（<a rel="ar">）クリック時のガード
    arBtn.addEventListener('click', e => {
      if (arBtn.dataset.disabled === 'true') { e.preventDefault(); return; }

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (!isIOS) {
        e.preventDefault();
        statusEl.textContent = 'AR は iOS Safari でのみ利用できます';
        return;
      }
      // iOS かつ GLB 準備完了 → デフォルト動作（AR Quick Look 起動）をそのまま通す
      statusEl.textContent = 'AR Quick Look 起動中...';
    });

    // 「更新」ボタン
    document.getElementById('updateBtn').addEventListener('click', updateAll);

    // 入力値変化 → デバウンス更新
    let debounceId = null;
    const onInput = () => {
      const { outerDia, length } = getParams();
      refreshPreview(outerDia, length); // Three.js は即時反映
      clearTimeout(debounceId);
      debounceId = setTimeout(() => generateAndCache(outerDia, length), 600);
    };
    document.getElementById('outerDia').addEventListener('input', onInput);
    document.getElementById('pipeLen').addEventListener('input', onInput);

    // コントロールパネルのタッチが OrbitControls に漏れないよう止める
    const panel = document.getElementById('controls');
    panel.addEventListener('touchstart', e => e.stopPropagation(), { passive: false });
    panel.addEventListener('mousedown',  e => e.stopPropagation());

    /* ══════════════════════════════════════════════════
       起動シーケンス
    ══════════════════════════════════════════════════ */
    (async () => {
      statusEl.textContent = '起動中...';
      swReady = await registerSW();
      await startCamera();

      const { outerDia, length } = getParams();
      refreshPreview(outerDia, length);

      if (!swReady) {
        statusEl.textContent = 'Service Worker 未登録 — ページを再読込してください';
        return;
      }

      await generateAndCache(outerDia, length);

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (!isIOS) {
        statusEl.textContent = 'プレビュー表示中（AR は iOS Safari のみ）';
      }
    })();
  </script>
</body>
</html>
