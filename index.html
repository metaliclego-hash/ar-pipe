<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>水道配管 AR</title>

  <!-- model-viewer — iOS AR Quick Look ブリッジ -->
  <script async src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    }

    #camera {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }

    #preview {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1; touch-action: none;
    }

    /*
      model-viewer をブラウザに「描画」させつつユーザーには見せない。
      display:none や opacity:0 だと WebGL コンテキストが初期化されず
      'load' イベントが発火しない / activateAR() が機能しないため
      opacity:0.001 + visibility コントロールで対応する。
    */
    model-viewer {
      position: fixed;
      width: 120px; height: 120px;
      bottom: 0; right: 0;
      opacity: 0.001;
      pointer-events: none;
      z-index: 0;
    }

    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      background: rgba(8, 10, 22, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      color: #fff;
    }

    .row {
      display: flex; gap: 12px;
      margin-bottom: 14px; align-items: flex-end;
    }

    .field { flex: 1; display: flex; flex-direction: column; gap: 5px; }

    .field label {
      font-size: 11px; font-weight: 700;
      color: #6688AA; letter-spacing: 0.6px; text-transform: uppercase;
    }

    .field input {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff; font-size: 18px; font-weight: 500;
      -webkit-appearance: none; appearance: none;
    }

    .field input:focus {
      outline: none; border-color: #007AFF;
      background: rgba(0,122,255,0.1);
    }

    .btn-row { display: flex; gap: 10px; }

    button {
      flex: 1; padding: 14px 10px;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.12s;
    }
    button:active { opacity: 0.7; }

    #updateBtn {
      background: rgba(255,255,255,0.13);
      color: #fff; flex: 0.65;
    }

    #arBtn {
      background: #007AFF; color: #fff; flex: 1.35;
    }
    #arBtn:disabled {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.25);
    }

    #status {
      margin-top: 10px; font-size: 12px;
      color: #556688; text-align: center; min-height: 16px;
    }

    .dot {
      display: inline-block;
      animation: blink 1.2s step-start infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.4s; }
    .dot:nth-child(3) { animation-delay: 0.8s; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>

  <video id="camera" autoplay playsinline muted></video>
  <canvas id="preview"></canvas>

  <!--
    model-viewer は GLB を内部ロードし activateAR() で
    ブラウザプロセス内の blob URL を iOS AR Quick Look に渡す。
    SW URL（HTTP）では iOS ネイティブDL がバイパスして 404 になるため
    必ず src には blob URL を使う。
  -->
  <model-viewer
    id="modelViewer"
    ar
    ar-modes="quick-look"
    ar-scale="fixed"
    camera-controls>
  </model-viewer>

  <div id="controls">
    <div class="row">
      <div class="field">
        <label>外径 (mm)</label>
        <input type="number" id="outerDia" value="100"
               min="10" max="500" step="5" inputmode="decimal">
      </div>
      <div class="field">
        <label>長さ (mm)</label>
        <input type="number" id="pipeLen" value="1000"
               min="100" max="5000" step="50" inputmode="decimal">
      </div>
    </div>
    <div class="btn-row">
      <button id="updateBtn">更新</button>
      <!--
        AR ボタンは <button> のままで OK。
        クリックハンドラ内で modelViewer.activateAR() を同期呼び出しすれば
        ユーザージェスチャが維持され iOS が AR Quick Look を許可する。
      -->
      <button id="arBtn" disabled>AR で実寸配置</button>
    </div>
    <div id="status">起動中...</div>
  </div>

  <script type="module">
    import * as THREE   from 'three';
    import { GLTFExporter }  from 'three/addons/exporters/GLTFExporter.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ══════════════════════════════════════════════════
       配管ジオメトリ
       scale=1 → mm 座標（プレビュー）
       scale=0.001 → m 座標（AR GLB）
    ══════════════════════════════════════════════════ */
    function buildPipeGroup(outerDiaMm, lengthMm, scale = 1) {
      const outerR = (outerDiaMm / 2) * scale;
      const wallMm = Math.max(2, outerDiaMm * 0.08);
      const innerR = Math.max(scale * 0.5, (outerDiaMm / 2 - wallMm) * scale);
      const len    = lengthMm * scale;

      const g = new THREE.Group();

      // 外面 グレー
      g.add(new THREE.Mesh(
        new THREE.CylinderGeometry(outerR, outerR, len, 48, 1, true),
        new THREE.MeshStandardMaterial({ color: 0x8A8A8A, roughness: 0.55, metalness: 0.15, side: THREE.FrontSide })
      ));

      // 内面 水色（DoubleSide で開口部から見える）
      g.add(new THREE.Mesh(
        new THREE.CylinderGeometry(innerR, innerR, len, 48, 1, true),
        new THREE.MeshStandardMaterial({ color: 0x87CEEB, roughness: 0.25, metalness: 0.0, side: THREE.DoubleSide })
      ));

      // 端面リング
      const capMat = new THREE.MeshStandardMaterial({ color: 0x8A8A8A, roughness: 0.55, metalness: 0.15, side: THREE.DoubleSide });
      for (const s of [-1, 1]) {
        const cap = new THREE.Mesh(new THREE.RingGeometry(innerR, outerR, 48), capMat);
        cap.rotation.x = Math.PI / 2;
        cap.position.y = s * len / 2;
        g.add(cap);
      }
      return g;
    }

    /* ══════════════════════════════════════════════════
       Three.js プレビュー
    ══════════════════════════════════════════════════ */
    const canvas   = document.getElementById('preview');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    const cam3D = new THREE.PerspectiveCamera(55, 1, 0.1, 100000);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 0.9);
    sun.position.set(2, 5, 3); scene.add(sun);
    const rim = new THREE.DirectionalLight(0xAADDFF, 0.4);
    rim.position.set(-3, 1, -2); scene.add(rim);

    const orbit = new OrbitControls(cam3D, canvas);
    orbit.enableDamping = true; orbit.dampingFactor = 0.07;
    orbit.minDistance = 10; orbit.maxDistance = 20000;

    let previewMesh = null;

    function refreshPreview(outerDia, length) {
      if (previewMesh) {
        scene.remove(previewMesh);
        previewMesh.traverse(o => {
          o.geometry?.dispose();
          if (o.material) [].concat(o.material).forEach(m => m.dispose());
        });
      }
      previewMesh = buildPipeGroup(outerDia, length, 1);
      previewMesh.rotation.z = Math.PI / 2;
      scene.add(previewMesh);
      const d = Math.max(outerDia, length);
      cam3D.position.set(0, d * 0.45, d * 1.5);
      cam3D.lookAt(0, 0, 0);
      orbit.target.set(0, 0, 0);
      orbit.update();
    }

    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      cam3D.aspect = w / h; cam3D.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();
    (function loop() { requestAnimationFrame(loop); orbit.update(); renderer.render(scene, cam3D); })();

    /* ══════════════════════════════════════════════════
       デバイスカメラ
    ══════════════════════════════════════════════════ */
    async function startCamera() {
      const v = document.getElementById('camera');
      try {
        v.srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
      } catch (e) {
        v.style.background = 'linear-gradient(135deg,#0f0c29,#302b63,#24243e)';
      }
    }

    /* ══════════════════════════════════════════════════
       Service Worker（仕様上登録。AR 配信は blob URL で行うため
       pipe.glb のキャッシュはフォールバック用途のみ）
    ══════════════════════════════════════════════════ */
    async function registerSW() {
      if (!('serviceWorker' in navigator)) return;
      try { await navigator.serviceWorker.register('./sw.js', { scope: './' }); } catch (_) {}
    }

    /* ══════════════════════════════════════════════════
       GLB 生成 → blob URL → model-viewer にロード
    ══════════════════════════════════════════════════ */
    const mv       = document.getElementById('modelViewer');
    const arBtn    = document.getElementById('arBtn');
    const statusEl = document.getElementById('status');
    let currentBlobURL = null;
    let modelReady     = false;
    let generating     = false;

    async function generateAndLoad(outerDia, length) {
      if (generating) return;
      generating = true;
      modelReady = false;
      arBtn.disabled = true;
      statusEl.innerHTML = 'GLB 生成中 <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';

      try {
        /* ── AR 用シーン（メートル単位） ── */
        const arScene = new THREE.Scene();
        const arPipe  = buildPipeGroup(outerDia, length, 0.001);
        arPipe.rotation.z = Math.PI / 2;              // 水平配置
        arPipe.position.y = (outerDia / 2) * 0.001;   // 外半径分浮かせ床面接地
        arScene.add(arPipe);

        /* ── GLB エクスポート ── */
        const exporter = new GLTFExporter();
        const raw = await new Promise((ok, ng) =>
          exporter.parse(arScene, ok, ng, { binary: true })
        );
        const ab = raw instanceof ArrayBuffer ? raw : new Uint8Array(raw).buffer;

        /* ── blob URL 生成 ── */
        if (currentBlobURL) URL.revokeObjectURL(currentBlobURL);
        currentBlobURL = URL.createObjectURL(new Blob([ab], { type: 'model/gltf-binary' }));

        /* ── model-viewer にロード ── */
        statusEl.innerHTML = 'モデル読込中 <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';
        mv.src = '';
        await new Promise(r => setTimeout(r, 80));
        mv.src = currentBlobURL;

        /*
          'load' イベントを待つ。
          model-viewer が opacity:0.001 で描画されていれば WebGL が初期化され
          正常に発火する。3 秒以内に来なければ警告付きで続行。
        */
        const loaded = await new Promise(resolve => {
          const tid = setTimeout(() => resolve(false), 3000);
          mv.addEventListener('load',  () => { clearTimeout(tid); resolve(true);  }, { once: true });
          mv.addEventListener('error', () => { clearTimeout(tid); resolve(false); }, { once: true });
        });

        modelReady = true;
        arBtn.disabled = false;

        if (loaded) {
          statusEl.textContent = '準備完了 ✓  AR ボタンで実寸配置できます';
        } else {
          statusEl.textContent = '準備完了（読込確認中）— AR を試してください';
          console.warn('model-viewer load event did not fire in 3s; proceeding anyway');
        }

      } catch (e) {
        statusEl.textContent = 'エラー: ' + e.message;
        console.error(e);
      } finally {
        generating = false;
      }
    }

    /* ══════════════════════════════════════════════════
       AR ボタン
       ─ <button> の click ハンドラ内で activateAR() を
         同期呼び出し → ユーザージェスチャが維持され
         iOS が AR Quick Look の起動を許可する。
         （非同期 await を挟むと iOS がジェスチャと見なさない場合がある）
    ══════════════════════════════════════════════════ */
    arBtn.addEventListener('click', () => {
      if (!modelReady) {
        statusEl.textContent = 'GLB 準備中です、少々お待ちください';
        return;
      }

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (!isIOS) {
        statusEl.textContent = 'AR は iOS Safari でのみ利用できます';
        return;
      }

      // ★ 同期呼び出し — ここで AR Quick Look が起動する
      mv.activateAR();
      statusEl.textContent = 'AR Quick Look 起動中...';
    });

    /* ══════════════════════════════════════════════════
       UI イベント
    ══════════════════════════════════════════════════ */
    function getParams() {
      return {
        outerDia: Math.max(10,  parseFloat(document.getElementById('outerDia').value) || 100),
        length:   Math.max(100, parseFloat(document.getElementById('pipeLen').value)  || 1000),
      };
    }

    document.getElementById('updateBtn').addEventListener('click', () => {
      const { outerDia, length } = getParams();
      refreshPreview(outerDia, length);
      generateAndLoad(outerDia, length);
    });

    let debounceId = null;
    const onInput = () => {
      const { outerDia, length } = getParams();
      refreshPreview(outerDia, length);
      clearTimeout(debounceId);
      debounceId = setTimeout(() => generateAndLoad(outerDia, length), 700);
    };
    document.getElementById('outerDia').addEventListener('input', onInput);
    document.getElementById('pipeLen').addEventListener('input', onInput);

    // コントロールパネルのタッチを Three.js OrbitControls に漏らさない
    const panel = document.getElementById('controls');
    panel.addEventListener('touchstart', e => e.stopPropagation(), { passive: false });
    panel.addEventListener('mousedown',  e => e.stopPropagation());

    /* ══════════════════════════════════════════════════
       起動
    ══════════════════════════════════════════════════ */
    (async () => {
      await registerSW();
      await startCamera();
      const { outerDia, length } = getParams();
      refreshPreview(outerDia, length);
      await generateAndLoad(outerDia, length);
    })();
  </script>
</body>
</html>
